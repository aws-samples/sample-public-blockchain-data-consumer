AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Public Blockchain Data Consumer with Hybrid Schema Discovery.
  Uses Glue Crawlers for initial schema discovery, then partition projection
  for automatic partition resolution. Crawlers run once and are disabled by default.

Parameters:
  S3Bucket:
    Type: String
    Default: "aws-public-blockchain"
    Description: Source S3 bucket with blockchain data
  SchemaVersion:
    Type: String
    Default: "v1.0"
    Description: Schema version for BTC/ETH
  SchemaVersionTON:
    Type: String
    Default: "v1.1"
    Description: Schema version for TON and newer chains
  DiscoverySchedule:
    Type: String
    Default: "cron(0 2 ? * SUN *)"
    Description: Schedule for new blockchain discovery (weekly)
  DefaultCrawlerSchedule:
    Type: String
    Default: "disabled"
    AllowedValues: ["hourly", "daily", "weekly", "disabled"]
    Description: Default crawler schedule. Disabled since partition projection handles new partitions.
  EnableAutoCrawling:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable automatic discovery scheduling
  LambdaBucket:
    Type: String
    Default: ""
    Description: S3 bucket containing Lambda code (leave empty for inline code)

Conditions:
  EnableCrawling: !Equals [!Ref EnableAutoCrawling, "true"]
  UseS3Lambda: !Not [!Equals [!Ref LambdaBucket, ""]]

Resources:
  # ==========================================================================
  # S3 and Athena Resources
  # ==========================================================================
  
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AthenaResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AthenaResultsBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ForceHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub ${AthenaResultsBucket.Arn}/*
              - !Sub ${AthenaResultsBucket.Arn}
            Condition:
              Bool:
                "aws:SecureTransport": false

  AthenaWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: AWSPublicBlockchain
      Description: AWS Public Blockchain Data
      RecursiveDeleteOption: true
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        RequesterPaysEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub s3://${AthenaResultsBucket}/results/
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  # ==========================================================================
  # IAM Roles
  # ==========================================================================
  
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-GlueCrawlerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub arn:aws:s3:::${S3Bucket}
                  - !Sub arn:aws:s3:::${S3Bucket}/*
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub ${AthenaResultsBucket.Arn}/*
        - PolicyName: GlueCatalog
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [glue:*Database*, glue:*Table*, glue:*Partition*]
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/*/*

  BlockchainDiscoveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DiscoveryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:ListBucket, s3:GetObject]
                Resource:
                  - !Sub arn:aws:s3:::${S3Bucket}
                  - !Sub arn:aws:s3:::${S3Bucket}/*
              - Effect: Allow
                Action: [glue:GetDatabase, glue:CreateDatabase, glue:GetCrawler, glue:CreateCrawler, glue:StartCrawler]
                Resource: '*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt GlueCrawlerRole.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref CrawlerNotificationTopic

  InitialDiscoveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeDiscovery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt BlockchainDiscoveryFunction.Arn
        - PolicyName: GlueCleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [glue:ListCrawlers, glue:GetCrawler, glue:StopCrawler, glue:DeleteCrawler, glue:GetDatabases, glue:GetTables, glue:DeleteTable, glue:DeleteDatabase]
                Resource: '*'

  CrawlerCompletionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GlueAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [glue:GetCrawler, glue:GetDatabase, glue:GetTable, glue:GetTables, glue:UpdateTable]
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:ListBucket, s3:GetObject]
                Resource:
                  - !Sub arn:aws:s3:::${S3Bucket}
                  - !Sub arn:aws:s3:::${S3Bucket}/*
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref CrawlerNotificationTopic

  # ==========================================================================
  # Lambda Functions
  # ==========================================================================
  
  BlockchainDiscoveryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-BlockchainDiscovery
      Description: Discovers blockchains in S3 and creates Glue databases/crawlers
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BlockchainDiscoveryRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET: !Ref S3Bucket
          SCHEMA_VERSION: !Ref SchemaVersion
          SCHEMA_VERSION_TON: !Ref SchemaVersionTON
          CRAWLER_ROLE_ARN: !GetAtt GlueCrawlerRole.Arn
          STACK_NAME: !Ref AWS::StackName
          SNS_TOPIC_ARN: !Ref CrawlerNotificationTopic
          DEFAULT_CRAWLER_SCHEDULE: !Ref DefaultCrawlerSchedule
      Code:
        ZipFile: |
          import boto3, json, os
          glue, s3, sns = boto3.client('glue'), boto3.client('s3'), boto3.client('sns')
          SCHEDULE = {'hourly': 'cron(0 * * * ? *)', 'daily': 'cron(0 0 * * ? *)', 'weekly': 'cron(0 0 ? * SUN *)', 'disabled': None}
          TABLES = {'blocks', 'transactions', 'logs', 'traces', 'token_transfers', 'contracts', 'messages'}
          NETWORKS = {'pubnet', 'testnet', 'mainnet'}
          VERSIONS = {'v1', 'v2', 'v3'}
          
          def has_parts(b, p):
              try:
                  r = s3.list_objects_v2(Bucket=b, Prefix=p, Delimiter='/', MaxKeys=10, RequestPayer='requester')
                  return any('=' in x['Prefix'].split('/')[-2] for x in r.get('CommonPrefixes', []))
              except: return False
          
          def is_chain(b, p):
              try:
                  r = s3.list_objects_v2(Bucket=b, Prefix=p, Delimiter='/', MaxKeys=20, RequestPayer='requester')
                  fs = [x['Prefix'].rstrip('/').split('/')[-1].lower() for x in r.get('CommonPrefixes', [])]
                  if 'parquet' in fs: return False
                  return any(f in TABLES or f in VERSIONS or f.startswith('date=') for f in fs)
              except: return False
          
          def scan(b, p, n, found, pag, d=0):
              if d > 5: return
              try:
                  all_p = [(x['Prefix'], x['Prefix'].rstrip('/').split('/')[-1].lower()) for pg in pag.paginate(Bucket=b, Prefix=p, Delimiter='/', RequestPayer='requester') for x in pg.get('CommonPrefixes', [])]
                  pq = next((x for x, f in all_p if f == 'parquet'), None)
                  if pq: scan(b, pq, n, found, pag, d+1); return
                  for sp, f in all_p:
                      if f in VERSIONS:
                          if has_parts(b, sp) and n not in found: found[n] = f"s3://{b}/{sp}"
                          else: scan(b, sp, n, found, pag, d+1)
                      elif '=' in f: continue
                      elif is_chain(b, sp):
                          if f in NETWORKS: scan(b, sp, f"{n}_{f}", found, pag, d+1)
                          elif f in TABLES:
                              if n not in found: found[n] = f"s3://{b}/{p}"; return
                          else:
                              if f"{n}_{f}" not in found: found[f"{n}_{f}"] = f"s3://{b}/{sp}"
                      elif f in NETWORKS: scan(b, sp, f"{n}_{f}", found, pag, d+1)
              except: pass
          
          def discover(b, v):
              found, pag = {}, s3.get_paginator('list_objects_v2')
              try:
                  for pg in pag.paginate(Bucket=b, Prefix=f"{v}/", Delimiter='/', RequestPayer='requester'):
                      for x in pg.get('CommonPrefixes', []):
                          p, n = x['Prefix'], x['Prefix'].strip('/').split('/')[1].lower()
                          if is_chain(b, p): found[n] = f"s3://{b}/{p}"
                          else: scan(b, p, n, found, pag)
              except: pass
              return found
          
          def handler(event, context):
              b, v1, v2 = os.environ['S3_BUCKET'], os.environ['SCHEMA_VERSION'], os.environ.get('SCHEMA_VERSION_TON', 'v1.1')
              role, stack, topic = os.environ['CRAWLER_ROLE_ARN'], os.environ['STACK_NAME'], os.environ['SNS_TOPIC_ARN']
              sched = SCHEDULE.get(os.environ.get('DEFAULT_CRAWLER_SCHEDULE', 'disabled'))
              chains = {**discover(b, v1), **{k: v for k, v in discover(b, v2).items() if k not in discover(b, v1)}}
              dbs, crs, started = [], [], []
              for c, path in chains.items():
                  db, cr = c.lower(), f"{stack}-{c.upper()}-Crawler"
                  try: glue.get_database(Name=db)
                  except: glue.create_database(DatabaseInput={'Name': db, 'Description': f'[{stack}] {c.upper()}'}); dbs.append(db)
                  try: glue.get_crawler(Name=cr)
                  except:
                      depth = len([x for x in path.replace('s3://', '').split('/') if x])
                      cfg = {"Version": 1.0, "CrawlerOutput": {"Partitions": {"AddOrUpdateBehavior": "InheritFromTable"}, "Tables": {"AddOrUpdateBehavior": "MergeNewColumns"}}}
                      if depth > 4: cfg["Grouping"] = {"TableGroupingPolicy": "CombineCompatibleSchemas", "TableLevelConfiguration": depth}
                      params = {'Name': cr, 'Role': role, 'DatabaseName': db, 'Targets': {'S3Targets': [{'Path': path, 'SampleSize': 10, 'Exclusions': ['**/*.xdr*', '**/*.json', '**/*.csv', '**/_*']}]}, 'SchemaChangePolicy': {'UpdateBehavior': 'LOG', 'DeleteBehavior': 'LOG'}, 'RecrawlPolicy': {'RecrawlBehavior': 'CRAWL_NEW_FOLDERS_ONLY'}, 'Configuration': json.dumps(cfg)}
                      if sched: params['Schedule'] = sched
                      glue.create_crawler(**params); crs.append(cr)
                      if glue.get_crawler(Name=cr)['Crawler']['State'] == 'READY': glue.start_crawler(Name=cr); started.append(cr)
              if dbs or crs: sns.publish(TopicArn=topic, Subject=f"Discovery: {len(chains)} chains", Message=f"DBs: {dbs}\nCrawlers: {crs}\nStarted: {started}")
              return {'statusCode': 200, 'body': json.dumps({'chains': list(chains.keys()), 'dbs': dbs, 'crawlers': crs})}

  InitialDiscoveryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-InitialDiscoveryTrigger
      Description: Triggers discovery on stack creation, cleanup on deletion
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt InitialDiscoveryRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request
          lam, glue = boto3.client('lambda'), boto3.client('glue')
          
          def send_response(event, context, status, data, physical_id):
              body = json.dumps({'Status': status, 'Reason': f'See CloudWatch Log Stream: {context.log_stream_name}', 'PhysicalResourceId': physical_id, 'StackId': event['StackId'], 'RequestId': event['RequestId'], 'LogicalResourceId': event['LogicalResourceId'], 'Data': data})
              req = urllib.request.Request(event['ResponseURL'], data=body.encode('utf-8'), headers={'Content-Type': ''}, method='PUT')
              urllib.request.urlopen(req)
          
          def cleanup(stack):
              for cr in glue.list_crawlers().get('CrawlerNames', []):
                  if cr.startswith(f"{stack}-"):
                      try:
                          if glue.get_crawler(Name=cr)['Crawler']['State'] == 'RUNNING': glue.stop_crawler(Name=cr); time.sleep(5)
                          glue.delete_crawler(Name=cr)
                      except: pass
              for db in glue.get_databases().get('DatabaseList', []):
                  if f'[{stack}]' in db.get('Description', ''):
                      try:
                          for t in glue.get_tables(DatabaseName=db['Name']).get('TableList', []): glue.delete_table(DatabaseName=db['Name'], Name=t['Name'])
                          glue.delete_database(Name=db['Name'])
                      except: pass
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create':
                      lam.invoke(FunctionName=event['ResourceProperties']['DiscoveryFunctionName'], InvocationType='RequestResponse', Payload=json.dumps({}))
                      send_response(event, context, 'SUCCESS', {'Result': 'OK'}, 'InitialDiscovery')
                  elif event['RequestType'] == 'Delete':
                      cleanup(event['ResourceProperties']['StackName'])
                      send_response(event, context, 'SUCCESS', {'Result': 'Cleaned'}, 'InitialDiscovery')
                  else: send_response(event, context, 'SUCCESS', {'Result': 'NoOp'}, 'InitialDiscovery')
              except Exception as e:
                  if event['RequestType'] == 'Delete': send_response(event, context, 'SUCCESS', {'Result': str(e)}, 'InitialDiscovery')
                  else: send_response(event, context, 'FAILED', {'Error': str(e)}, 'InitialDiscovery')

  CrawlerCompletionHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-CrawlerCompletionHandler
      Description: Adds partition projection after crawler completes
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CrawlerCompletionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref CrawlerNotificationTopic
          S3_BUCKET: !Ref S3Bucket
      Code:
        ZipFile: |
          import boto3, json, os
          from datetime import datetime
          glue, s3, sns = boto3.client('glue'), boto3.client('s3'), boto3.client('sns')
          
          def oldest_date(loc):
              try:
                  parts = loc.replace('s3://', '').split('/', 1)
                  r = s3.list_objects_v2(Bucket=parts[0], Prefix=parts[1].rstrip('/')+'/date=', Delimiter='/', MaxKeys=1, RequestPayer='requester')
                  for p in r.get('CommonPrefixes', []):
                      f = p['Prefix'].rstrip('/').split('/')[-1]
                      if f.startswith('date='): return f.split('=')[1]
              except: pass
              return None
          
          def dedupe(db, tbl):
              try:
                  t = glue.get_table(DatabaseName=db, Name=tbl)['Table']
                  pkeys = {pk['Name'].lower() for pk in t.get('PartitionKeys', [])}
                  if not pkeys: return None
                  sd = t['StorageDescriptor']
                  orig = sd.get('Columns', [])
                  filt = [c for c in orig if c['Name'].lower() not in pkeys]
                  removed = [c['Name'] for c in orig if c['Name'].lower() in pkeys]
                  if not removed: return None
                  inp = {'Name': t['Name'], 'StorageDescriptor': {**sd, 'Columns': filt}}
                  for k in ['Description', 'Owner', 'Retention', 'PartitionKeys', 'TableType', 'Parameters']:
                      if k in t: inp[k] = t[k]
                  glue.update_table(DatabaseName=db, TableInput=inp)
                  return removed
              except: return None
          
          def add_proj(db, tbl):
              try:
                  t = glue.get_table(DatabaseName=db, Name=tbl)['Table']
                  if 'date' not in [pk['Name'].lower() for pk in t.get('PartitionKeys', [])]: return None
                  params = t.get('Parameters', {})
                  if params.get('projection.enabled') == 'true': return None
                  loc = t['StorageDescriptor']['Location'].rstrip('/')
                  start = oldest_date(loc) or '2020-01-01'
                  params.update({'projection.enabled': 'true', 'projection.date.type': 'date', 'projection.date.range': f'{start},NOW', 'projection.date.format': 'yyyy-MM-dd', 'projection.date.interval': '1', 'projection.date.interval.unit': 'DAYS', 'storage.location.template': f'{loc}/date=${{date}}'})
                  inp = {'Name': t['Name'], 'StorageDescriptor': t['StorageDescriptor'], 'Parameters': params}
                  for k in ['Description', 'Owner', 'Retention', 'PartitionKeys', 'TableType']:
                      if k in t: inp[k] = t[k]
                  glue.update_table(DatabaseName=db, TableInput=inp)
                  return {'start': start}
              except: return None
          
          def handler(event, context):
              cr, state = event['detail']['crawlerName'], event['detail']['state']
              if state != 'Succeeded': return {'statusCode': 200}
              db = glue.get_crawler(Name=cr)['Crawler']['DatabaseName']
              tables = [t for pg in glue.get_paginator('get_tables').paginate(DatabaseName=db) for t in pg.get('TableList', [])]
              proj = {}
              for t in tables:
                  dedupe(db, t['Name'])
                  r = add_proj(db, t['Name'])
                  if r: proj[t['Name']] = r
              msg = f"Crawler: {cr}\nDatabase: {db}\nTables: {len(tables)}\nProjection enabled: {list(proj.keys())}"
              sns.publish(TopicArn=os.environ['SNS_TOPIC_ARN'], Subject=f"Crawler Complete: {cr}", Message=msg)
              return {'statusCode': 200}

  # ==========================================================================
  # EventBridge and Custom Resources
  # ==========================================================================
  
  BlockchainDiscoverySchedule:
    Type: AWS::Events::Rule
    Condition: EnableCrawling
    Properties:
      Name: !Sub ${AWS::StackName}-DiscoverySchedule
      Description: Weekly blockchain discovery
      ScheduleExpression: !Ref DiscoverySchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt BlockchainDiscoveryFunction.Arn
          Id: DiscoveryTarget

  BlockchainDiscoveryPermission:
    Type: AWS::Lambda::Permission
    Condition: EnableCrawling
    Properties:
      FunctionName: !Ref BlockchainDiscoveryFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BlockchainDiscoverySchedule.Arn

  InitialDiscoveryTrigger:
    Type: Custom::InitialDiscovery
    DependsOn: [BlockchainDiscoveryFunction, GlueCrawlerRole, CrawlerNotificationTopic]
    Properties:
      ServiceToken: !GetAtt InitialDiscoveryFunction.Arn
      DiscoveryFunctionName: !Ref BlockchainDiscoveryFunction
      StackName: !Ref AWS::StackName

  CrawlerStateChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-CrawlerStateChange
      Description: Trigger completion handler when crawlers finish
      EventPattern:
        source: [aws.glue]
        detail-type: [Glue Crawler State Change]
        detail:
          state: [Succeeded, Failed]
          crawlerName:
            - prefix: !Ref AWS::StackName
      State: ENABLED
      Targets:
        - Arn: !GetAtt CrawlerCompletionHandler.Arn
          Id: CompletionTarget

  CrawlerCompletionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CrawlerCompletionHandler
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CrawlerStateChangeRule.Arn

  # ==========================================================================
  # SNS and SSM
  # ==========================================================================
  
  CrawlerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-Notifications
      KmsMasterKeyId: alias/aws/sns

  BucketNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${AWS::StackName}/bucket
      Type: String
      Value: !Ref S3Bucket

  SchemaVersionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${AWS::StackName}/schema-version
      Type: String
      Value: !Ref SchemaVersion

Outputs:
  AthenaResultsBucket:
    Description: S3 bucket for Athena query results
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub ${AWS::StackName}-AthenaResultsBucket
  AthenaWorkgroup:
    Description: Athena workgroup for blockchain queries
    Value: !Ref AthenaWorkgroup
    Export:
      Name: !Sub ${AWS::StackName}-AthenaWorkgroup
  BlockchainDiscoveryFunction:
    Description: Lambda function for blockchain discovery
    Value: !Ref BlockchainDiscoveryFunction
    Export:
      Name: !Sub ${AWS::StackName}-DiscoveryFunction
  CrawlerNotificationTopicArn:
    Description: SNS topic for notifications
    Value: !Ref CrawlerNotificationTopic
    Export:
      Name: !Sub ${AWS::StackName}-NotificationTopic
  GlueCrawlerRoleArn:
    Description: IAM role for Glue crawlers
    Value: !GetAtt GlueCrawlerRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-CrawlerRole
